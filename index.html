<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Quiet Shelf — Your Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --paper:#EEE1C3;
    --paper-2:#E4D3A8;
    --page-cream:#FBF3E0;
    --wood:#6B4428;
    --wood-dark:#432A18;
    --wood-light:#8B5A34;
    --ink:#2B2013;
    --ink-soft:#5A4A38;
    --brass:#B8935A;
    --brass-light:#D9B77C;
    --green:#3F5641;
    --green-dark:#2C3E2E;
    --red:#8C3B2E;
    --hl-yellow:#F4D35E;
    --hl-green:#A8D5BA;
    --hl-pink:#E8A9BE;
    --hl-blue:#9FC1DE;
    --shadow: rgba(25,16,8,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(216,170,110,.35), transparent 60%),
      var(--paper);
    font-family:'Lora',serif;
    color:var(--ink);
    min-height:100vh;
  }
  ::selection{ background: var(--hl-yellow); color:var(--ink); }
  button{ font:inherit; }

  /* ---------- Header ---------- */
  header{
    padding:38px 6vw 22px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    flex-wrap:wrap;
    border-bottom:3px solid var(--wood);
  }
  .brand{ display:flex; flex-direction:column; gap:4px; }
  .brand .eyebrow{
    font-family:'Inter',sans-serif; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--brass); font-weight:600;
  }
  h1{
    font-family:'Fraunces', serif; font-weight:700; font-size:clamp(30px,4.2vw,46px);
    margin:0; color:var(--ink); letter-spacing:-.01em;
  }
  .brand p{ margin:2px 0 0; color:var(--ink-soft); font-size:14.5px; font-style:italic; }

  .toolbar{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .search-wrap{ position:relative; }
  .search-wrap input{
    font-family:'Lora',serif; font-size:14px; padding:11px 16px 11px 38px;
    border:1.5px solid var(--wood-light); border-radius:999px; background:var(--paper-2);
    color:var(--ink); width:220px; outline:none; transition:.15s;
  }
  .search-wrap input:focus{ border-color:var(--brass); background:#fff8ea; width:260px; }
  .search-wrap svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.55; }

  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    border:none; border-radius:999px; cursor:pointer; padding:12px 20px;
    display:inline-flex; align-items:center; gap:8px; transition:.15s transform, .15s box-shadow;
  }
  .btn:active{ transform:scale(.96); }
  .btn-primary{
    background:linear-gradient(180deg,var(--green) 0%, var(--green-dark) 100%);
    color:#F3ECD8; box-shadow:0 3px 0 #21301f, 0 6px 14px var(--shadow);
  }
  .btn-primary:hover{ box-shadow:0 3px 0 #21301f, 0 8px 20px var(--shadow); }
  .btn-secondary{
    background:var(--paper-2); color:var(--ink); border:1.5px solid var(--wood-light);
  }
  .btn-secondary:hover{ background:#fff8ea; }

  /* ---------- Shelves ---------- */
  main{ padding:36px 6vw 90px; max-width:1400px; margin:0 auto; }

  .shelf-section{ margin-bottom:34px; }
  .nameplate{
    display:flex; align-items:center; gap:10px; margin:0 0 -2px 14px; position:relative; z-index:2;
  }
  .nameplate .plate{
    background:linear-gradient(180deg, var(--brass-light), var(--brass));
    color:var(--wood-dark); font-family:'Fraunces',serif; font-weight:600; font-size:13px;
    letter-spacing:.05em; padding:6px 16px; border-radius:4px 4px 0 0;
    box-shadow:0 -2px 6px var(--shadow), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .nameplate .count{ font-family:'Inter',sans-serif; font-size:11px; color:var(--ink-soft); }
  .nameplate .shelf-del{
    background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:12px;
    font-family:'Inter',sans-serif; opacity:.6;
  }
  .nameplate .shelf-del:hover{ opacity:1; color:var(--red); }

  .shelves{
    background:
      repeating-linear-gradient(180deg,
        var(--wood) 0px, var(--wood) 4px,
        transparent 4px, transparent 198px),
      repeating-linear-gradient(180deg,
        transparent 0px, transparent 190px,
        var(--wood-dark) 190px, var(--wood-dark) 198px);
    background-color: transparent;
    border-radius:10px;
    padding:2px 0 0;
  }
  .shelf-row{
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:16px;
    padding:16px 26px 34px;
    position:relative;
    min-height:198px;
  }
  .shelf-row::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:14px;
    background:linear-gradient(180deg, var(--wood-light), var(--wood-dark));
    box-shadow:0 6px 10px var(--shadow), inset 0 2px 0 rgba(255,255,255,.15);
  }

  .book{
    width:118px; height:168px; border-radius:3px 6px 6px 3px; position:relative; cursor:pointer;
    box-shadow:2px 4px 8px var(--shadow), -2px 0 0 rgba(0,0,0,.15) inset;
    overflow:hidden; flex-shrink:0; transition:.18s transform;
    background-size:cover; background-position:center; border:1px solid rgba(0,0,0,.25);
  }
  .book:hover{ transform:translateY(-8px) rotate(-1deg); z-index:5; }
  .book .spine-edge{
    position:absolute; left:0; top:0; bottom:0; width:9px;
    background:linear-gradient(90deg, rgba(0,0,0,.45), transparent);
  }
  .book .label{
    position:absolute; left:0; right:0; bottom:0; padding:16px 8px 7px;
    background:linear-gradient(0deg, rgba(20,12,5,.9), rgba(20,12,5,0));
    color:#F3ECD8; font-family:'Fraunces',serif; font-size:11px; font-weight:600; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    opacity:0; transform:translateY(4px); transition:.15s;
  }
  .book:hover .label{ opacity:1; transform:translateY(0); }
  .book .del, .book .move{
    position:absolute; top:5px; width:22px; height:22px; border-radius:50%;
    background:rgba(20,12,5,.55); color:#F3ECD8; border:none; display:flex; align-items:center;
    justify-content:center; cursor:pointer; opacity:0; transition:.15s; font-size:11px;
  }
  .book .del{ right:5px; }
  .book .move{ right:31px; }
  .book:hover .del, .book:hover .move{ opacity:1; }
  .book .progress-tick{
    position:absolute; left:0; bottom:0; height:4px; background:var(--brass-light);
  }
  .book .session-badge{
    position:absolute; top:6px; left:6px; background:var(--red); color:#fff; font-size:9px;
    font-family:'Inter',sans-serif; font-weight:600; padding:2px 6px; border-radius:4px;
  }

  .add-slot{
    width:118px; height:168px; border-radius:4px; border:2.5px dashed var(--brass);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;
    color:var(--brass); cursor:pointer; flex-shrink:0; background:rgba(255,255,255,.08);
    transition:.15s;
  }
  .add-slot:hover{ background:rgba(255,255,255,.2); transform:translateY(-4px); }
  .add-slot span{ font-family:'Inter',sans-serif; font-size:11px; font-weight:600; text-align:center; padding:0 10px;}

  .empty-state{
    text-align:center; padding:70px 20px 30px; color:var(--ink-soft);
  }
  .empty-state h2{ font-family:'Fraunces',serif; font-size:26px; color:var(--ink); margin-bottom:8px; }
  .empty-state p{ max-width:420px; margin:0 auto 22px; font-size:15px; }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,12,5,.55); z-index:200;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:var(--page-cream); border-radius:12px; padding:26px 28px; max-width:380px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,.5); border:1px solid var(--brass);
  }
  .modal-box h3{ font-family:'Fraunces',serif; margin:0 0 6px; font-size:19px; }
  .modal-box p.hint{ font-size:13px; color:var(--ink-soft); margin:0 0 14px; }
  .modal-chip-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .modal-chip{
    padding:8px 14px; border-radius:999px; border:1.5px solid var(--wood-light); background:#fff;
    cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; transition:.15s;
  }
  .modal-chip:hover{ background:var(--paper-2); }
  .modal-box input[type=text]{
    width:100%; font-family:'Lora',serif; font-size:14px; padding:10px 12px;
    border:1.5px solid var(--wood-light); border-radius:8px; outline:none; margin-bottom:14px;
  }
  .modal-box input[type=text]:focus{ border-color:var(--brass); }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; }

  /* ---------- move menu ---------- */
  .move-menu{
    position:fixed; background:var(--page-cream); border:1px solid var(--brass); border-radius:10px;
    box-shadow:0 10px 26px rgba(0,0,0,.4); z-index:150; padding:6px; min-width:150px; display:none;
  }
  .move-menu.show{ display:block; }
  .move-menu .mm-item{
    padding:8px 10px; border-radius:6px; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif;
  }
  .move-menu .mm-item:hover{ background:var(--paper-2); }
  .move-menu .mm-new{ color:var(--brass); font-weight:600; border-top:1px solid var(--paper-2); margin-top:4px; padding-top:8px; }

  /* ---------- Reader ---------- */
  .reader{
    position:fixed; inset:0; z-index:100; display:none; flex-direction:column;
  }
  .reader.open{ display:flex; }
  .reader-top{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:12px 22px; border-bottom:3px solid var(--brass);
    flex-wrap:wrap;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 2px, transparent 2px 5px),
      linear-gradient(180deg, var(--wood-light), var(--wood-dark));
  }
  .reader-top .title-block{ color:#F6EFDD; font-family:'Fraunces',serif; }
  .reader-top .title-block b{ font-size:16px; }
  .reader-top .title-block div{ font-size:11.5px; color:#D9C7A3; font-family:'Inter',sans-serif; }
  .reader-controls{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .icon-btn{
    background:var(--page-cream); border:1.5px solid var(--brass); color:var(--ink);
    width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.15s; font-size:14px;
  }
  .icon-btn:hover{ background:var(--brass-light); }
  .icon-btn.active{ background:var(--brass); border-color:var(--brass); color:#221507; }
  .page-indicator{
    color:var(--wood-dark); font-family:'Fraunces',serif; font-weight:600; font-size:12.5px;
    min-width:64px; text-align:center; background:linear-gradient(180deg,var(--brass-light),var(--brass));
    border-radius:999px; padding:6px 12px; box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  }
  .swatches{
    display:flex; gap:7px; padding:5px 9px; background:rgba(0,0,0,.18); border-radius:999px;
  }
  .swatch{ width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid rgba(255,255,255,.5); }
  .swatch.active{ border-color:#fff; transform:scale(1.2); box-shadow:0 0 0 1px var(--wood-dark); }

  .reader-body{
    flex:1; overflow:auto; display:flex; justify-content:center; padding:40px 16px 90px; position:relative;
    background:
      radial-gradient(ellipse 760px 420px at 50% 0%, rgba(230,180,110,.16), transparent 62%),
      linear-gradient(180deg, #3B2A1C 0%, #251809 65%, #1B1108 100%);
  }
  .page-wrap{
    position:relative; background:var(--page-cream);
    box-shadow:5px 5px 0 -2px #ddcda4, 7px 8px 22px rgba(0,0,0,.55);
  }
  .page-wrap canvas{ display:block; }
  .text-layer{
    position:absolute; left:0; top:0; overflow:hidden; line-height:1;
    opacity:1;
  }
  .text-layer span{ position:absolute; white-space:pre; color:transparent; cursor:text; }
  .hl-layer{ position:absolute; left:0; top:0; pointer-events:none; }
  .hl-box{ position:absolute; mix-blend-mode:multiply; border-radius:2px; }

  .sel-toolbar{
    position:fixed; display:none; background:var(--wood-dark); border:1px solid var(--brass);
    border-radius:10px; padding:6px; gap:6px; box-shadow:0 6px 18px rgba(0,0,0,.5); z-index:250;
  }
  .sel-toolbar.show{ display:flex; }
  .sel-toolbar .swatch{ width:22px; height:22px; }

  .loading-msg{ color:#D9C7A3; font-family:'Inter',sans-serif; text-align:center; padding-top:80px; max-width:340px; line-height:1.5; }

  .side-panel{
    position:fixed; top:0; right:-340px; width:320px; height:100%; background:var(--page-cream);
    box-shadow:-8px 0 24px rgba(0,0,0,.35); z-index:110; transition:.25s; padding:22px 18px;
    overflow-y:auto;
  }
  .side-panel.open{ right:0; }
  .side-panel h3{ font-family:'Fraunces',serif; margin:0 0 14px; font-size:19px; }
  .hl-item{
    background:#fff; border-radius:8px; padding:10px 12px; margin-bottom:10px; cursor:pointer;
    border-left:5px solid var(--hl-yellow); font-size:13px; color:var(--ink-soft); line-height:1.4;
  }
  .hl-item small{ display:block; font-family:'Inter',sans-serif; color:var(--brass); margin-top:5px; font-weight:600;}
  .hl-item .hl-del{ float:right; background:none; border:none; cursor:pointer; color:#b55; font-size:12px; }

  #fileInput{ display:none; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="eyebrow">est. today</div>
    <h1>The Quiet Shelf</h1>
    <p>A small warm room for the books you keep coming back to.</p>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5A4A38" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" placeholder="Search your shelf…">
    </div>
    <button class="btn btn-secondary" id="newShelfBtn">＋ New shelf</button>
    <button class="btn btn-primary" id="addBtn">＋ Add a book</button>
  </div>
</header>

<main>
  <div id="libraryArea"></div>
</main>

<input type="file" id="fileInput" accept="application/pdf" multiple>

<!-- Reader -->
<div class="reader" id="reader">
  <div class="reader-top">
    <div class="title-block">
      <b id="readerTitle">—</b>
      <div id="readerAuthor"></div>
    </div>
    <div class="reader-controls">
      <button class="icon-btn" id="prevPage" title="Previous page">‹</button>
      <div class="page-indicator" id="pageIndicator">1 / 1</div>
      <button class="icon-btn" id="nextPage" title="Next page">›</button>
      <button class="icon-btn" id="zoomOut" title="Zoom out">－</button>
      <button class="icon-btn" id="zoomIn" title="Zoom in">＋</button>
      <div class="swatches" id="hlColorPicker"></div>
      <button class="icon-btn" id="togglePanel" title="Highlights">✎</button>
      <button class="icon-btn" id="closeReader" title="Close">✕</button>
    </div>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="loading-msg" id="loadingMsg">Opening your book…</div>
  </div>
</div>

<div class="side-panel" id="sidePanel">
  <h3>Your highlights</h3>
  <div id="hlList"></div>
</div>

<div class="sel-toolbar" id="selToolbar"></div>
<div class="move-menu" id="moveMenu"></div>

<!-- Modal (new shelf / choose shelf) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">New shelf</h3>
    <p class="hint" id="modalHint">Give it a name — a genre, a mood, whatever helps you find things later.</p>
    <div class="modal-chip-list" id="modalChips"></div>
    <input type="text" id="modalInput" placeholder="e.g. Mystery, Poetry, Bedtime reading…">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmOverlay">
  <div class="modal-box">
    <h3 id="confirmTitle">Remove this book?</h3>
    <p class="hint" id="confirmMessage"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
      <button class="btn btn-primary" id="confirmOk" style="background:linear-gradient(180deg,#A24B3A,#6E2E22);">Remove</button>
    </div>
  </div>
</div>

<script>
(function(){
  const HL_COLORS = [
    {name:'yellow', hex:'#F4D35E'},
    {name:'green',  hex:'#A8D5BA'},
    {name:'pink',   hex:'#E8A9BE'},
    {name:'blue',   hex:'#9FC1DE'},
  ];
  const COVER_PALETTE = ['#7A3B32','#3F5641','#2E4A63','#6B4428','#5B3A5C','#7A5A2E','#3B5A56'];
  const UNSORTED = 'Unsorted';

  let INDEX = [];              // library index (metadata)
  let SHELVES = [UNSORTED];    // ordered shelf names
  let sessionFiles = {};       // id -> base64 (books too big to persist)
  let currentBook = null;
  let pdfDoc = null;
  let currentPage = 1;
  let scale = 1.3;
  let hlColor = 0;
  let highlights = [];
  let saveProgressTimer = null;
  let pendingUploadShelf = undefined; // undefined = ask via modal; string = use directly

  const $ = (sel) => document.querySelector(sel);
  const libraryArea = $('#libraryArea');

  // ---------- pdf.js worker ----------
  // Kept deliberately simple: pointing workerSrc at the CDN file lets pdf.js load a real
  // worker when the environment allows it, and fall back to its own built-in "fake worker"
  // (main-thread) mode when it doesn't. That fallback is what works reliably inside a
  // sandboxed iframe — a fancier blob/Worker setup here can throw in ways pdf.js can't
  // recover from, which is worse than a harmless console warning.
  function setupPdfWorker(){
    try{
      if(typeof pdfjsLib !== 'undefined'){
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
    }catch(e){ /* ignore — getDocument calls are guarded separately */ }
  }

  // ---------- storage helpers ----------
  async function loadIndex(){
    try{
      const r = await window.storage.get('library-index', false);
      INDEX = r ? JSON.parse(r.value) : [];
    }catch(e){ INDEX = []; }
    INDEX.forEach(b => { if(!b.shelf) b.shelf = UNSORTED; });
  }
  async function persistIndex(){
    try{ await window.storage.set('library-index', JSON.stringify(INDEX), false); }
    catch(e){ console.error('Could not save library index', e); }
  }
  async function loadShelves(){
    try{
      const r = await window.storage.get('shelf-names', false);
      SHELVES = r ? JSON.parse(r.value) : [UNSORTED];
    }catch(e){ SHELVES = [UNSORTED]; }
    if(!SHELVES.includes(UNSORTED)) SHELVES.push(UNSORTED);
  }
  async function persistShelves(){
    try{ await window.storage.set('shelf-names', JSON.stringify(SHELVES), false); }catch(e){}
  }
  // Storage caps each key at ~5MB, but plenty of real PDFs are bigger than that.
  // So a book's base64 data is split across numbered chunk keys instead of one big key.
  const CHUNK_SIZE = 4500000;     // ~4.5MB per chunk, safely under the 5MB-per-key ceiling
  const MAX_CHUNKS = 24;          // ~100MB of base64 (~75MB source file) before we give up persisting it
  async function saveFile(id, base64){
    const chunkCount = Math.ceil(base64.length / CHUNK_SIZE) || 1;
    if(chunkCount > MAX_CHUNKS) return false;
    try{
      for(let i=0;i<chunkCount;i++){
        const chunk = base64.slice(i*CHUNK_SIZE, (i+1)*CHUNK_SIZE);
        const res = await window.storage.set(`file:${id}:${i}`, chunk, false);
        if(!res) throw new Error('chunk save failed');
      }
      const res = await window.storage.set(`file:${id}:meta`, JSON.stringify({chunks:chunkCount}), false);
      if(!res) throw new Error('meta save failed');
      return true;
    }catch(e){
      for(let i=0;i<chunkCount;i++){ try{ await window.storage.delete(`file:${id}:${i}`, false); }catch(_){} }
      try{ await window.storage.delete(`file:${id}:meta`, false); }catch(_){}
      return false;
    }
  }
  async function getFile(id){
    if(sessionFiles[id]) return sessionFiles[id];
    try{
      const metaRes = await window.storage.get(`file:${id}:meta`, false);
      if(metaRes){
        const meta = JSON.parse(metaRes.value);
        let result = '';
        for(let i=0;i<meta.chunks;i++){
          const r = await window.storage.get(`file:${id}:${i}`, false);
          if(!r) return null;
          result += r.value;
        }
        return result;
      }
    }catch(e){ /* fall through to legacy single-key lookup below */ }
    try{
      const legacy = await window.storage.get(`file:${id}`, false); // books saved before chunking existed
      if(legacy) return legacy.value;
    }catch(e){}
    return null;
  }
  async function deleteFileKey(id){
    try{
      const metaRes = await window.storage.get(`file:${id}:meta`, false);
      if(metaRes){
        const meta = JSON.parse(metaRes.value);
        for(let i=0;i<meta.chunks;i++){ try{ await window.storage.delete(`file:${id}:${i}`, false); }catch(_){} }
      }
    }catch(e){}
    try{ await window.storage.delete(`file:${id}:meta`, false); }catch(e){}
    try{ await window.storage.delete(`file:${id}`, false); }catch(e){}
    try{ await window.storage.delete('highlights:'+id, false); }catch(e){}
    try{ await window.storage.delete('progress:'+id, false); }catch(e){}
  }
  async function loadHighlights(id){
    try{
      const r = await window.storage.get('highlights:'+id, false);
      return r ? JSON.parse(r.value) : [];
    }catch(e){ return []; }
  }
  async function persistHighlights(id, list){
    try{
      const res = await window.storage.set('highlights:'+id, JSON.stringify(list), false);
      if(!res) console.error('Highlight save returned no result');
    }catch(e){ console.error('Could not save highlight', e); }
  }
  async function loadProgress(id){
    try{
      const r = await window.storage.get('progress:'+id, false);
      return r ? JSON.parse(r.value).page : 1;
    }catch(e){ return 1; }
  }
  async function persistProgress(id, page){
    try{ await window.storage.set('progress:'+id, JSON.stringify({page}), false); }catch(e){}

  // ---------- utils ----------
  function arrayBufferToBase64(buf){
    let binary = '';
    const bytes = new Uint8Array(buf);
    const chunk = 0x8000;
    for(let i=0;i<bytes.length;i+=chunk){
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
    }
    return btoa(binary);
  }
  function base64ToUint8Array(b64){
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }
  function hashStr(s){
    let h = 0;
    for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
    return Math.abs(h);
  }
  function niceTitleFromFilename(name){
    return name.replace(/\.pdf$/i,'').replace(/[_-]+/g,' ').trim();
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function fallbackCover(title){
    const c = document.createElement('canvas');
    c.width = 240; c.height = 340;
    const ctx = c.getContext('2d');
    const color = COVER_PALETTE[hashStr(title) % COVER_PALETTE.length];
    ctx.fillStyle = color; ctx.fillRect(0,0,240,340);
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 3;
    ctx.strokeRect(12,12,216,316);
    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.font = '600 18px Georgia, serif';
    ctx.textAlign = 'center';
    const words = title.split(' ');
    let lines = []; let cur = '';
    words.forEach(w=>{
      const test = cur ? cur+' '+w : w;
      if(ctx.measureText(test).width > 190){ lines.push(cur); cur = w; } else cur = test;
    });
    if(cur) lines.push(cur);
    lines = lines.slice(0,4);
    const startY = 170 - (lines.length-1)*13;
    lines.forEach((l,i)=> ctx.fillText(l, 120, startY + i*24));
    return c.toDataURL('image/jpeg', .85);
  }

  async function renderCoverFromPdf(pdf){
    try{
      const page = await pdf.getPage(1);
      const vp0 = page.getViewport({scale:1});
      const targetW = 240;
      const s = targetW / vp0.width;
      const vp = page.getViewport({scale: s});
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      const ctx = canvas.getContext('2d');
      await page.render({canvasContext: ctx, viewport: vp}).promise;
      return canvas.toDataURL('image/jpeg', .82);
    }catch(e){ return null; }
  }

  // Sandboxed iframes (like this one runs in) commonly block window.alert/confirm/prompt

  function showToast(msg){

        + 'max-width:320px;text-align:center;transition:opacity .2s;opacity:0;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';

  function renderLibrary(filterText){
    libraryArea.innerHTML = '';

    if(INDEX.length === 0 && !filterText){
      const es = document.createElement('div');
      es.className = 'empty-state';
      es.innerHTML = `<h2>The shelves are bare.</h2>
        <p>Bring a book in from your desktop — a PDF works well — and it'll take its place, cover facing out.</p>`;
      libraryArea.appendChild(es);

    if(filterText){
      const filtered = INDEX.filter(b => b.title.toLowerCase().includes(filterText.toLowerCase()));

        libraryArea.appendChild(es);

      }
      libraryArea.appendChild(renderShelfSection('Search results', filtered, null));
      return;

    SHELVES.forEach(shelfName=>{

  function renderShelfSection(label, books, shelfContext){

  async function handleUpload(file, shelfName){
    if(file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')){
      showToast(`"${file.name}" isn't a PDF. For now, The Quiet Shelf only reads PDFs.`);
      return;
    }
    const buf = await file.arrayBuffer();
    const base64 = arrayBufferToBase64(buf);
    const id = 'b_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    let title = niceTitleFromFilename(file.name);
    let cover = null;
    let pageCount = 0;
    try{
      const pdf = await pdfjsLib.getDocument({data: base64ToUint8Array(base64)}).promise;
      pageCount = pdf.numPages;
      const meta = await pdf.getMetadata().catch(()=>null);
      if(meta && meta.info && meta.info.Title) title = meta.info.Title;
      cover = await renderCoverFromPdf(pdf);
    }catch(e){ /* fall through to placeholder */ }
    if(!cover) cover = fallbackCover(title);

    showToast(`Adding "${title}"…`);
    const ok = await saveFile(id, base64);
    const sessionOnly = !ok;
    if(sessionOnly) sessionFiles[id] = base64;

    INDEX.push({
      id, title, cover, pageCount,
      shelf: shelfName || UNSORTED,
      addedAt: Date.now(),
      sessionOnly,
      progressPct: 0
    });
    await persistIndex();
    renderLibrary($('#searchInput').value);
    showToast(sessionOnly ? `"${title}" added for this session only — it was too large to save permanently.` : `"${title}" added to ${shelfName || UNSORTED}.`);
  }

  // ---------- search ----------

  const readerEl = $('#reader');
  const readerBody = $('#readerBody');

  function buildColorPicker(){

    wrap.innerHTML = '';
    HL_COLORS.forEach((c, i)=>{
      const sw = document.createElement('div');
      sw.className = 'swatch' + (i===hlColor ? ' active' : '');

  async function openReader(book){
    currentBook = book;
    readerEl.classList.add('open');
    $('#readerTitle').textContent = book.title;
    $('#readerAuthor').textContent = book.pageCount ? `${book.pageCount} pages · ${book.shelf}` : book.shelf;
    readerBody.innerHTML = '<div class="loading-msg" id="loadingMsg">Opening your book…</div>';

    if(typeof pdfjsLib === 'undefined'){
      readerBody.innerHTML = `<div class="loading-msg">The PDF engine hasn't loaded, so this book can't open right now. Try refreshing the page.</div>`;
      return;
    }
    const base64 = await getFile(book.id);
    if(!base64){
      readerBody.innerHTML = `<div class="loading-msg">This book's pages didn't stay with us — either it couldn't be saved (very large files sometimes can't) or this is a fresh session. Please add it again from your desktop.</div>`;
      return;
    }
    try{
      pdfDoc = await pdfjsLib.getDocument({data: base64ToUint8Array(base64)}).promise;
    }catch(e){
      readerBody.innerHTML = `<div class="loading-msg">This file couldn't be opened. It may be corrupted or password-protected.</div>`;
      return;
    }
    highlights = await loadHighlights(book.id);
    currentPage = Math.min(await loadProgress(book.id) || 1, pdfDoc.numPages);
    scale = 1.3;
    await renderPage();
  }

  $('#closeReader').addEventListener('click', ()=>{
    readerEl.classList.remove('open');

      currentBook.progressPct = pdfDoc ? Math.round((currentPage/pdfDoc.numPages)*100) : 0;
      persistIndex();
      renderLibrary($('#searchInput').value);

  });

  $('#prevPage').addEventListener('click', ()=> gotoPage(currentPage-1));
  $('#nextPage').addEventListener('click', ()=> gotoPage(currentPage+1));
  $('#zoomIn').addEventListener('click', ()=>{ scale = Math.min(scale+0.2, 3); renderPage(); });
  $('#zoomOut').addEventListener('click', ()=>{ scale = Math.max(scale-0.2, 0.6); renderPage(); });
  $('#togglePanel').addEventListener('click', ()=>{

  function gotoPage(p){
    if(!pdfDoc) return;
    if(p<1 || p>pdfDoc.numPages) return;
    currentPage = p;
    renderPage();
    clearTimeout(saveProgressTimer);
    saveProgressTimer = setTimeout(()=> persistProgress(currentBook.id, currentPage), 400);
  }

  async function renderPage(){
    if(!pdfDoc) return;
    const page = await pdfDoc.getPage(currentPage);
    const viewport = page.getViewport({scale});

    readerBody.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    wrap.style.width = viewport.width+'px';
    wrap.style.height = viewport.height+'px';

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    wrap.appendChild(canvas);

    const textLayer = document.createElement('div');
    textLayer.className = 'text-layer';
    textLayer.style.width = viewport.width+'px';
    textLayer.style.height = viewport.height+'px';
    wrap.appendChild(textLayer);

    const hlLayer = document.createElement('div');
    hlLayer.className = 'hl-layer';
    hlLayer.style.width = viewport.width+'px';
    hlLayer.style.height = viewport.height+'px';
    wrap.appendChild(hlLayer);

    readerBody.appendChild(wrap);

    await page.render({canvasContext: ctx, viewport}).promise;

    const textContent = await page.getTextContent();
    textContent.items.forEach(item=>{
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const angle = Math.atan2(tx[1], tx[0]);
      const fontHeight = Math.hypot(tx[2], tx[3]);
      const span = document.createElement('span');
      span.textContent = item.str;
      span.style.left = tx[4]+'px';
      span.style.top = (tx[5]-fontHeight)+'px';
      span.style.fontSize = fontHeight+'px';
      span.style.fontFamily = 'sans-serif';
      span.style.transform = `rotate(${angle}rad)`;
      span.style.transformOrigin = 'left bottom';
      textLayer.appendChild(span);
    });

    drawHighlights(hlLayer, viewport.width, viewport.height);

    textLayer.addEventListener('mouseup', ()=>{
      setTimeout(()=> onSelectionMaybe(hlLayer, viewport.width, viewport.height, wrap), 0);
    });

    $('#pageIndicator').textContent = `${currentPage} / ${pdfDoc.numPages}`;
  }

  function drawHighlights(hlLayer, w, h){
    hlLayer.innerHTML = '';
    highlights.filter(hl=>hl.page===currentPage).forEach(hl=>{
      hl.rects.forEach(r=>{
        const box = document.createElement('div');
        box.className = 'hl-box';
        box.style.left = (r.x*w)+'px';
        box.style.top = (r.y*h)+'px';
        box.style.width = (r.w*w)+'px';
        box.style.height = (r.h*h)+'px';
        box.style.background = hl.hex;
        hlLayer.appendChild(box);
      });
    });
  }

  function onSelectionMaybe(hlLayer, w, h, wrap){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed || sel.rangeCount===0) return;
    const text = sel.toString().trim();
    if(!text) return;
    const range = sel.getRangeAt(0);
    const rects = Array.from(range.getClientRects()).filter(r=>r.width>0 && r.height>0);
    if(rects.length===0) return;
    const wrapRect = wrap.getBoundingClientRect();

    // toolbar is position:fixed, so we place it using raw viewport coordinates —
    // independent of any scrolling inside the reader body.
    const toolbar = $('#selToolbar');
    const last = rects[rects.length-1];
    const toolbarWidth = 26 * HL_COLORS.length + 20;
    let left = last.left;
    let top = last.bottom + 8;
    left = Math.max(8, Math.min(left, window.innerWidth - toolbarWidth - 8));
    top = Math.min(top, window.innerHeight - 50);
    toolbar.style.left = left + 'px';
    toolbar.style.top = top + 'px';
    toolbar.innerHTML = '';
    HL_COLORS.forEach((c)=>{
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = c.hex;
      sw.addEventListener('click', async ()=>{
        const relRects = rects.map(r=>({
          x:(r.left-wrapRect.left)/w, y:(r.top-wrapRect.top)/h,
          w:r.width/w, h:r.height/h
        }));
        const newHighlight = {
          id:'h_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          page: currentPage, hex:c.hex, text: text.slice(0,300), rects: relRects
        };
        highlights.push(newHighlight);
        drawHighlights(hlLayer, w, h);   // show it immediately, don't wait on storage
        toolbar.classList.remove('show');
        sel.removeAllRanges();
        renderHlPanel();
        await persistHighlights(currentBook.id, highlights);
      });
      toolbar.appendChild(sw);
    });
    toolbar.classList.add('show');
  }
  document.addEventListener('mousedown', (e)=>{
    if(!e.target.closest('#selToolbar')) $('#selToolbar').classList.remove('show');
  });

  function renderHlPanel(){
    const list = $('#hlList');
    if(!currentBook){ list.innerHTML=''; return; }
    if(highlights.length===0){
      list.innerHTML = `<p style="color:var(--ink-soft);font-size:13.5px;">Select any text on the page and pick a colour to save your first highlight here.</p>`;
      return;
    }
    list.innerHTML = '';
    highlights.slice().sort((a,b)=>a.page-b.page).forEach(hl=>{
      const item = document.createElement('div');
      item.className = 'hl-item';
      item.style.borderLeftColor = hl.hex;
      item.innerHTML = `${escapeHtml(hl.text)}<small>Page ${hl.page}</small><button class="hl-del">remove</button>`;
      item.addEventListener('click', (e)=>{
        if(e.target.closest('.hl-del')) return;
        gotoPage(hl.page);
      });
      item.querySelector('.hl-del').addEventListener('click', async (e)=>{
        e.stopPropagation();
        highlights = highlights.filter(h=>h.id!==hl.id);
        await persistHighlights(currentBook.id, highlights);
        renderHlPanel();
        renderPage();
      });
      list.appendChild(item);
    });
  }

  // ---------- init ----------
  (async function init(){
    setupPdfWorker();
    try{ await loadShelves(); }catch(e){ console.error(e); }
    try{ await loadIndex(); }catch(e){ console.error(e); }
    if(typeof pdfjsLib === 'undefined'){
      const banner = document.createElement('div');
      banner.style.cssText = 'background:#8C3B2E;color:#fff;padding:12px 20px;border-radius:8px;margin:0 6vw 20px;font-family:Inter,sans-serif;font-size:13.5px;';
      banner.textContent = "The PDF engine didn't load — books can still be added, but reading won't work until you refresh the page.";
      document.body.insertBefore(banner, document.querySelector('main'));
    }
    renderLibrary();
  })();
})();
</script>
